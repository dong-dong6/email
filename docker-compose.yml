services:
  api:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      HTTP_ADDR: "${HTTP_ADDR:-:8080}"
      DATA_DIR: /data
      BLOB_DIR: /data/blobs
      DATABASE_URL: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-email}?sslmode=disable"
    ports:
      - "${API_HTTP_PORT:-8080}:8080"
    volumes:
      - mail-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./backend
    command: ["/app/email-api"]
    env_file:
      - .env
    environment:
      HTTP_ADDR: ":8081"
      DATA_DIR: /data
      BLOB_DIR: /data/blobs
    volumes:
      - mail-data:/data
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
  mail-data:
