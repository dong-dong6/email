services:
  api:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      HTTP_ADDR: ":8080"
      DATA_DIR: /data
      BLOB_DIR: /data/blobs
    volumes:
      - mail-data:/data
    depends_on:
      - postgres
    restart: unless-stopped

  worker:
    build:
      context: ./backend
    command: ["/app/email-api"]
    env_file:
      - .env
    environment:
      HTTP_ADDR: ":8081"
      DATA_DIR: /data
      BLOB_DIR: /data/blobs
    volumes:
      - mail-data:/data
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres-data:
  mail-data:
  caddy-data:
  caddy-config:
