services:
  api:
    build:
      context: ./backend
    environment:
      APP_ENV: "${APP_ENV:-production}"
      HTTP_ADDR: "${HTTP_ADDR:-:8080}"
      PUBLIC_URL: "${PUBLIC_URL:-http://localhost:8080}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:5173,http://localhost:3000}"
      MASTER_KEY_BASE64: "${MASTER_KEY_BASE64:-}"
      DATA_DIR: /data
      BLOB_DIR: /data/blobs
      DATABASE_URL: "postgres://${POSTGRES_USER:-email}@postgres:5432/${POSTGRES_DB:-email}?sslmode=disable"
    ports:
      - "${API_HTTP_PORT:-8080}:8080"
    volumes:
      - mail-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./backend
    command: ["/app/email-api"]
    environment:
      APP_ENV: "${APP_ENV:-production}"
      HTTP_ADDR: ":8081"
      PUBLIC_URL: "${PUBLIC_URL:-http://localhost:8080}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:5173,http://localhost:3000}"
      MASTER_KEY_BASE64: "${MASTER_KEY_BASE64:-}"
      DATA_DIR: /data
      BLOB_DIR: /data/blobs
      DATABASE_URL: "postgres://${POSTGRES_USER:-email}@postgres:5432/${POSTGRES_DB:-email}?sslmode=disable"
    volumes:
      - mail-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-email}"
      POSTGRES_USER: "${POSTGRES_USER:-email}"
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
  mail-data:
